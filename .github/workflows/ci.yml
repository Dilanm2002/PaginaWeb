name: CI — Sal y Canela

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-test:
    name: Validar y testear
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Verificar estructura HTML
        run: |
          grep -q '<!DOCTYPE html>'  index.html && echo "✅ DOCTYPE presente"
          grep -q '<html lang='      index.html && echo "✅ atributo lang presente"
          grep -q '<title>'          index.html && echo "✅ title presente"
          grep -q 'aria-label'       index.html && echo "✅ aria-label presente"

      - name: Verificar sintaxis JavaScript
        run: |
          node --check js/logica-carrito.js && echo "✅ logica-carrito.js OK"
          node --check js/carrito.js        && echo "✅ carrito.js OK"
          node --check js/autenticacion.js  && echo "✅ autenticacion.js OK"
          node --check js/vista.js          && echo "✅ vista.js OK"
          node --check js/aplicacion.js     && echo "✅ aplicacion.js OK"
          node --check js/vista-cajero.js   && echo "✅ vista-cajero.js OK"
          node --check js/vista-admin.js    && echo "✅ vista-admin.js OK"
          node --check js/vista-menu.js     && echo "✅ vista-menu.js OK"

      - name: Verificar archivos JS existen
        run: |
          for f in js/logica-carrito.js js/carrito.js js/autenticacion.js js/vista.js js/aplicacion.js js/vista-cajero.js js/vista-admin.js js/vista-menu.js; do
            [ -f "$f" ] && echo "✅ $f existe" || (echo "❌ $f FALTA" && exit 1)
          done

      - name: Correr tests Vitest
        run: npm test
