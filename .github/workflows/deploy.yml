name: Build & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Minificar CSS y JS
        run: npm run build

      - name: Copiar archivos estáticos al dist
        run: |
          cp index.html dist/index.html
          cp -r "imagenes comida" dist/ 2>/dev/null || true

      - name: Actualizar rutas en dist/index.html (ya apuntan a assets/ y js/)
        run: echo "Rutas correctas, sin cambios necesarios"

      - name: Deploy a GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
